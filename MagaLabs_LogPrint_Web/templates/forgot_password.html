{% extends "base.html" %}

{% block content %}
<style>
    .forgot-wrapper {
        max-width: 400px;
        margin: 40px auto;
        padding: 30px;
        text-align: center;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .forgot-title {
        color: #0086ff;
        font-weight: 700;
        margin-bottom: 20px;
    }

    .input-group {
        position: relative;
        margin-bottom: 25px;
        text-align: left;
    }

    .magalu-input {
        width: 100%;
        height: 56px;
        padding: 12px 16px;
        font-size: 16px;
        background-color: #f0f5ff;
        border: 1px solid #d0d7e1;
        border-radius: 8px;
        outline: none;
        box-sizing: border-box;
    }

    .magalu-label {
        position: absolute;
        left: 12px;
        top: -10px;
        padding: 0 6px;
        background-color: #ffffff;
        color: #667085;
        font-size: 13px;
        font-weight: 500;
    }

    .btn-magalu-blue {
        width: 100%;
        height: 52px;
        background-color: #0086ff;
        color: #ffffff;
        border: none;
        border-radius: 26px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 10px;
    }

    .back-to-login {
        display: block;
        margin-top: 20px;
        color: #666;
        text-decoration: none;
        font-size: 0.9rem;
    }

    .back-to-login:hover {
        color: #0086ff;
    }
</style>

<div class="forgot-wrapper">
    <h2 class="forgot-title">Recuperar Senha</h2>
    <p style="color: #666; margin-bottom: 30px;">Informe seu usuário para obter instruções de recuperação.</p>

    <form method="POST">
        <div class="input-group">
            <input type="text" name="username" class="magalu-input" required>
            <label class="magalu-label">Usuário (ex: login.setor)</label>
        </div>

        <button type="submit" class="btn-magalu-blue">Verificar Usuário</button>
    </form>

    <a href="{{ url_for('login') }}" class="back-to-login">
        <i class="fas fa-arrow-left"></i> Voltar para o Login
    </a>
</div>
{% endblock %}

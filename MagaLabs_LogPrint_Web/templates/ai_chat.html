{% extends "base.html" %}

{% block title %}MagaBot - Chat de Assistência T.I{% endblock %}

{% block content %}
<div class="chat-container">
    <div class="chat-header">
        <div class="flex justify-between items-center w-full">
            <div class="flex items-center gap-4">
                <div class="bot-avatar-container">
                    <img src="{{ url_for('static', filename='img/bot_avatar.png') }}" alt="MagaBot">
                </div>
                <div>
                    <h3 class="text-white-m0">MagaBot Assistente</h3>
                    <div class="status-indicator">
                        <span class="pulse-dot"></span>
                        <span>Ativo</span>
                    </div>
                </div>
            </div>
            <a href="{{ url_for('main.dashboard') }}" class="btn-custom btn-back">
                <i class="fas fa-arrow-left"></i> Voltar
            </a>
        </div>
    </div>

    <div class="chat-messages" id="chat-messages">
        <div class="message bot">
            <img src="{{ url_for('static', filename='img/bot_avatar.png') }}" alt="Bot Avatar" class="bot-avatar-msg">
            Olá! Sou o MagaBot, seu assistente técnico. Como posso ajudar com os ativos da MagaLabs hoje?
        </div>
    </div>

    <div class="chat-input-area">
        <input type="text" id="user-input" class="chat-input"
            placeholder="Pergunte sobre equipamentos ou peça ajuda técnica..."
            onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="btn-send" onclick="sendMessage()" title="Enviar mensagem">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chat-messages');
    const userInput = document.getElementById('user-input');

    function addMessage(text, isUser) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isUser ? 'user' : 'bot'}`;

        let content = text;
        if (!isUser) {
            content = `<img src="{{ url_for('static', filename='img/bot_avatar.png') }}" alt="Bot Avatar" class="bot-avatar-msg">${text}`;
        }

        msgDiv.innerHTML = content;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return msgDiv;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        userInput.value = '';
        addMessage(text, true);

        // Mostrar loading
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message bot';
        loadingDiv.innerHTML = `
            <img src="{{ url_for('static', filename='img/bot_avatar.png') }}" alt="Bot Avatar" class="bot-avatar-msg">
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>`;
        chatMessages.appendChild(loadingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
            const response = await fetch("{{ url_for('main.ai_chat') }}", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();

            chatMessages.removeChild(loadingDiv);
            addMessage(data.response, false);
        } catch (error) {
            chatMessages.removeChild(loadingDiv);
            addMessage("Desculpe, tive um problema para processar sua mensagem.", false);
        }
    }
</script>
{% endblock %}

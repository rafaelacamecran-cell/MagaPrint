{% extends "base.html" %}

{% block title %}Alterar Senha - MagaLabs{% endblock %}

{% block content %}
<style>
    .change-password-wrapper {
        max-width: 400px;
        margin: 50px auto;
        padding: 30px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
    }

    .change-title {
        color: #0d7ee7;
        margin-bottom: 20px;
        font-weight: 700;
    }

    .info-box {
        background: #f0f7ff;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 25px;
        font-size: 0.9rem;
        color: #0056b3;
        border-left: 4px solid #0d7ee7;
    }

    .form-group {
        margin-bottom: 20px;
        text-align: left;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #555;
    }

    .form-control {
        width: 100%;
        padding: 12px;
        border: 2px solid #eee;
        border-radius: 8px;
        outline: none;
        transition: border-color 0.3s;
    }

    .form-control:focus {
        border-color: #0d7ee7;
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        background: #0d7ee7;
        color: white;
        border: none;
        border-radius: 25px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    .btn-submit:hover {
        background: #0066cc;
        box-shadow: 0 5px 15px rgba(13, 126, 231, 0.3);
    }
</style>

<div class="change-password-wrapper">
    <div class="flex justify-between items-center mb-4">
        <h2 class="change-title mb-0"><i class="fas fa-key"></i> Alterar Senha</h2>
        <a href="{{ url_for('welcome') }}" class="btn-custom btn-back btn-small">
            <i class="fas fa-arrow-left"></i> Voltar
        </a>
    </div>

    <div class="info-box">
        <i class="fas fa-info-circle"></i> Este é o seu primeiro acesso ou sua senha foi resetada. Por favor, defina uma
        nova senha para continuar.
    </div>

    <form method="POST">
        <div class="form-group">
            <label for="new_password">Nova Senha</label>
            <input type="password" id="new_password" name="new_password" class="form-control" required minlength="4">
        </div>

        <div class="form-group">
            <label for="confirm_password">Confirmar Nova Senha</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control" required
                minlength="4">
        </div>

        <button type="submit" class="btn-submit">Atualizar Senha e Continuar</button>
    </form>
</div>
{% endblock %}
